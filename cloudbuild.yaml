# Cloud Build configuration for deploying ViMax to Cloud Run
# This file tells Google Cloud Build how to build and deploy your container

steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/vimax-zechy",
        "-t",
        "gcr.io/$PROJECT_ID/vimax-zechy:$COMMIT_SHA",
        ".",
      ]
    timeout: 1200s

  # Step 2: Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/vimax-zechy"]
    timeout: 600s

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "vimax-zechy",
        "--image=gcr.io/$PROJECT_ID/vimax-zechy:$COMMIT_SHA",
        "--region=europe-west1",
        "--platform=managed",
        "--allow-unauthenticated",
        "--memory=8Gi",
        "--cpu=4",
        "--timeout=3600",
        "--max-instances=1",
        "--set-env-vars=PORT=8080",
      ]
    timeout: 300s

# Store images in Container Registry
images:
  - "gcr.io/$PROJECT_ID/vimax-zechy"
  - "gcr.io/$PROJECT_ID/vimax-zechy:$COMMIT_SHA"

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

# Total timeout for the entire build
timeout: 2400s
